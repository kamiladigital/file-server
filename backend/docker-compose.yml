version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-server-app
    ports:
      - "8080:8080"
    networks:
      - file-server-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  file-server-net:
    driver: bridge
